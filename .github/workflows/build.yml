name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: JSub Debug Build v${{ github.run_number }}
          body: |
            Automated debug build of JSub real-time subtitle app.
            
            ### Features
            - Real-time Japanese speech recognition
            - SenseVoice (local offline) + Anime-Whisper (online) dual engine
            - DeepSeek / Kimi / LibreTranslate translation support
            - Floating subtitle window overlay
            
            ### Install
            Download `app-debug.apk` below and install on your Android device.
            
            ### Requirements
            - Android 8.0+ (API 26)
            - Network connection (for translation and online recognition)
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
