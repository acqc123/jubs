name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          cache-disabled: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: |
          gradle assembleDebug --stacktrace --no-daemon --no-build-cache > build.log 2>&1 || {
            echo "=== BUILD FAILED ==="
            tail -80 build.log
            exit 1
          }
          ls -la app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: jsub-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: JSub Debug Build v${{ github.run_number }}
          body: |
            Automated debug build of JSub real-time subtitle app.
            
            ### Features
            - 4 recognition engines: Anime-Whisper, SenseVoice, Xunfei, Baidu
            - DeepSeek translation
            - Floating subtitle overlay
            
            ### Install
            Download `app-debug.apk` below.
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
